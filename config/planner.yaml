DATASET_ID: 820
OUTPUT_BASE: "data/dataset"

IMAGE_FOLDER: "data/dataset/Dataset820/nifti/"
MASK_FOLDER: "data/dataset/Dataset820/seg/"

IMAGE_SUFFIX: "_0000.nii.gz"
MASK_SUFFIX: ".nii.gz"
CLASS_FILTER: null

TARGET_SPACING: [1.0, 1.0, 1.0]  # target spacing in mm (x, y, z)
# "anisotropic": keep X/Y median, sharpen Z when > Z_COARSE_THRESH to max(min(z,1.0), min(x,y))
# "isotropic":   all axes set to global minimum median spacing
SPACING_MODE: "isotropic"
# Z-axis median threshold (mm) above which Z is sharpened (only when SPACING_MODE=anisotropic)
Z_COARSE_THRESH: 2.0
# Axis ordering for saved .npy files: "ZYX" (SimpleITK native, nnU-Net compatible)
# or "XYZ" (transpose Z<->X for viewers that expect width-first arrays)
SAVE_AXES_ORDER: "XYZ"

EXPANSION_MM: 5.0
ANISO_RATIO_THRESH: 2.0


MIN_VOI_SIZE: [96, 96, 64]  # [96, 96, 64] to enforce minimum size
ENFORCE_MIN_VOI: true  # Optional: explicitly enable/disable

LABELS:
  1: "kidney"
  2: "tumor"
  3: "cyst"

BBOX_LABELS: [1, 2, 3]
MASK_LABELS: [2]

MIN_KIDNEY_VOXELS: 20000
MIN_TUMOR_VOXELS: 100

PATIENT_ID_PATTERN: "(?:\\d{2}_)?(case_\\d{5})|^(TCGA-[A-Z0-9]+-[A-Z0-9]+)"

N_FOLDS: 5
TEST_RATIO: 0.1
RANDOM_SEED: 12345          # seed for stratified split reproducibility
VOI_SUBFOLDER: "images"      # path relative to OUTPUT_DIR (…/voi) containing <class>/<patient_id>/...
