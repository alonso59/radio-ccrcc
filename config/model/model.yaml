
# Model-specific config for the autoencoder
autoencoder:
  spatial_dims: 3
  in_channels: 1
  out_channels: 1
  num_res_blocks: [2, 2, 2, 2, 2]
  channels: [16, 32, 64, 128, 128]
  attention_levels: [false, false, false, true, true]
  latent_channels: 256
  norm_num_groups: 16
  norm_eps: 0.000001
  with_encoder_nonlocal_attn: true
  with_decoder_nonlocal_attn: true
  use_checkpoint: false
  use_convtranspose: false
  include_fc: false
  use_combined_linear: false
  use_flash_attention: false
  pretrain: false
  freeze: false
  pretrained_path: /home/alonso/Documents/radio-ccrcc/outputs/2025-12-13/08-56-24/checkpoints/best_autoencoder.pth

discriminator:
  spatial_dims: 3
  in_channels: 1
  base_channels: 32
  num_layers_d: 4
  kernel_size: 4
  norm: BATCH
  activation: LEAKYRELU
  negative_slope: 0.2
  out_channels: 1

classifier:
  spatial_dims: 3
  in_channels: 1
  num_classes: 2
  backbone: "resnet50"
  pretrained: true
  dropout: 0.5