dataset:
  dataset_id: 720
  voi_root: data/dataset/Dataset${dataset.dataset_id}/voi
  mask_label_value: 2
  # Contrast phase selection: null (no phases), single phase ("art", "ven", "nc", "delay"), or "all" for all phases
  contrast_phase: "art"
output:
  root: outputs/radiomics/Dataset${dataset.dataset_id}

pyradiomics:
  config: config/radiomics/pyradiomics.yaml

analysis:
  exclude_columns:
    - sample_id
    - patient_id
    - case_id
    - side
    - image_path
    - mask_path
    - class_raw
    - group_label
    - dominant_label
    - contains_d
    - contrast_phase
  max_missing: 0.2
  # Merge equivalent groups: C -> A or predominant of mixed
  merge_groups:
    C: A
    AB: A
    AC: A
    BC: B
  test_groups: [A, B]

