defaults:
  - model: model


# Results output layout
results:
  root: results
  experiment: ${dataset.dataset_id}_ldm_${trainer.training_mode}

# Hydra output: write runs directly into results/ (timestamped per run)
hydra:
  run:
    dir: ${results.root}/${results.experiment}/fold_${dataset.fold}/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${results.root}/${results.experiment}/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: fold_${dataset.fold}/${hydra.job.num}
  job_logging:
    handlers:
      file:
        filename: ${hydra.runtime.output_dir}/Training_log_${now:%Y-%m-%d_%H-%M-%S}.log

dataset:
  dataset_id: Dataset820         # Dataset ID (e.g., Dataset220, Dataset320, Dataset420)
  dataset_type: images           # Options: images | segmentation
  base_path: data/dataset        # Base path to dataset folder
  fold: 0
  batch_size: 16
  num_workers: 12
  augment: true
  image_key: ct

ldm:
  num_train_steps: 1000
  beta_schedule: linear         # linear | cosine
  beta_start: 1.0e-4
  beta_end: 2.0e-2
  prediction_type: epsilon      # epsilon | x0 | v
  latent_scale: 1.0             # set to 0.18215 if you want SD-style scaling
  freeze_autoencoder: true
  ema_decay: 0.0                # e.g., 0.9999 to enable EMA
  log_image_interval: 5
  label_key: label              # optional, if your dataloader provides class labels

trainer:
  training_mode: vae    # Options: vae, gan, classifier
  max_epochs: 1000
  checkpoint_dir: checkpoints/
  device: cuda
  use_dataparallel: true        # Use DataParallel for multi-GPU training
  use_amp: true                 # if you want AMP for speed
  log_image_every_n_steps: 200  # optional step-wise preview
  monitor_metric: val_loss          # Metric to monitor for best model
  experiment_name: null         # Optional: descriptive name for this run (logged as metadata)
  probe_interval: 10        # cada N épocas
  probe_max_batches: 100     # cuántos batches para extraer embeddings (barato)
  probe_epochs: 10          # epochs del clasificador lineal
  probe_lr: 1e-2
  probe_l2: 1e-4

scheduler:
  name: CosineAnnealingLR
  T_max: 1000
  eta_min: 1e-6

loss:
  lpips_net: alex
  lpips_max_slices: 8
  lpips_min_step: 1

optimizer:
  name: Adam
  lr: 1e-3
  lr_g: 1e-3
  lr_d: 1e-4    
  lr_unet: 0.0001
  betas_g: [0.9, 0.999]
  betas_d: [0.0, 0.999]
  weight_decay: 0.0

loss_weights:
  recon: 1.0
  perceptual: 0.05
  adversarial: 0.1
  kl: 5e-6

adversarial_warmup_epochs: 500

gan:
  type: hinge_sn # hinge_sn, wgan-gp
  lambda_gp: 10.0
  n_critic: 5
  spectral_norm: false